name: Synthetic CPU compute smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: courselens-synthetic-smoke-${{ github.repository_id }}
  cancel-in-progress: false

jobs:
  asr:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      COURSELENS_MODEL_ROOT: ${{ github.workspace }}/.models
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.10"
          cache: pip
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .models
          key: asr-models-v1-sensevoice-7d1efa21-firered-1da8b737
      - name: Install generated-speech tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes espeak-ng ffmpeg
      - name: Install pinned runtime
        run: python -m pip install --requirement requirements.txt
      - name: Restore verified model cache
        run: python scripts/install_models.py
      - name: Recognize runner-generated speech
        run: python scripts/synthetic_asr_smoke.py
      - name: Remove transient data
        if: always()
        run: |
          rm -rf .work
          find "${RUNNER_TEMP}" -maxdepth 1 -type d -name 'courselens-synthetic-*' -exec rm -rf {} +
